workflows:
  android-build:
    name: Native Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 18
      vars:
        APP_URL: "https://example.com"
        APP_NAME: "MyApp"
        APP_PACKAGE_NAME: "com.droidify.myapp"
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Configure app
        script: |
          node scripts/configure.js

      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Set Android permissions
        script: |
          node scripts/set-permissions.js

      - name: Apply native enhancements
        script: |
          node scripts/enhance-native.js

      - name: Configure release signing
        script: |
          # Use debug keystore for signing so Gradle produces a signed AAB/APK
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          if [ ! -f "$KEYSTORE_PATH" ]; then
            keytool -genkey -v -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"
          fi

          # Add signing config to app/build.gradle
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            # Insert signingConfigs block before buildTypes
            sed -i "s|buildTypes {|signingConfigs {\n        release {\n            storeFile file(\"$KEYSTORE_PATH\")\n            storePassword \"android\"\n            keyAlias \"androiddebugkey\"\n            keyPassword \"android\"\n        }\n    }\n\n    buildTypes {|" "$GRADLE_FILE"
            # Set release buildType to use the signing config
            sed -i "s|release {|release {\n            signingConfig signingConfigs.release|" "$GRADLE_FILE"
          fi

      - name: Build Android AAB and APK
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease

    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - builds@droidify.app
        notify:
          success: false
          failure: true
